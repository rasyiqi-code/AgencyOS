version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_STACK_PROJECT_ID: ${NEXT_PUBLIC_STACK_PROJECT_ID}
        NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY: ${NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY}
        STACK_SECRET_SERVER_KEY: ${STACK_SECRET_SERVER_KEY}
    container_name: agency-os-web-prod
    restart: always
    expose:
      - "3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXT_PUBLIC_STACK_PROJECT_ID=${NEXT_PUBLIC_STACK_PROJECT_ID}
      - NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY=${NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY}
      - STACK_SECRET_SERVER_KEY=${STACK_SECRET_SERVER_KEY}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - MIDTRANS_SERVER_KEY=${MIDTRANS_SERVER_KEY}
      - MIDTRANS_CLIENT_KEY=${MIDTRANS_CLIENT_KEY}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}

      - SUPER_ADMIN_ID=${SUPER_ADMIN_ID}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - VERCEL_CLIENT_ID=${VERCEL_CLIENT_ID}
      - VERCEL_CLIENT_SECRET=${VERCEL_CLIENT_SECRET}
      - VERCEL_INTEGRATION_SLUG=${VERCEL_INTEGRATION_SLUG}
      - NODE_ENV=production
    volumes:
      # Persist data directory (portfolios, payment-info) across redeployments
      - app_data_prod:/app/data
    networks:
      - agency-network-prod


networks:
  agency-network-prod:
    driver: bridge

volumes:
  app_data_prod:
